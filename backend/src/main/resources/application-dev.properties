
spring.datasource.url=jdbc:postgresql://localhost:5432/rastreador_db
spring.datasource.username=postgres
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ==============================================================
# FLYWAY (Migrań§es)
# ==============================================================
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
# Se precisar reparar erros de checksum em desenvolvimento:
# spring.flyway.repair-on-migrate=true

# ==============================================================
# SEGURANŪA (JWT)
# ==============================================================

jwt.secret=${JWT_SECRET:5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437}
# Tempo de expirańŃo em milissegundos (86400000 ms = 24 horas)
jwt.expiration=${JWT_EXPIRATION:86400000}

# ==============================================================
# CONFIGURAŪšES DE LOGGING
# ==============================================================
logging.level.org.springframework.web=INFO
logging.level.com.rastreador.backend=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# ==============================================================
# ACTUATOR (Monitoramento)
# ==============================================================
management.endpoints.web.exposure.include=health,info,metrics

# Cache config: expira ap¾s 10 minutos de inatividade
spring.cache.type=caffeine
spring.cache.caffeine.spec=expireAfterWrite=10m